<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Все отзывы | ARCHISPACE</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <style>
        .reviews-page {
            min-height: 100vh;
            padding: 140px 60px 80px;
            background: var(--color-bg-primary);
        }

        .reviews-page-header {
            max-width: 900px;
            margin: 0 auto 50px;
            text-align: center;
        }

        .reviews-page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 56px;
            margin-bottom: 12px;
            color: var(--color-text-primary);
        }

        .reviews-page-subtitle {
            color: var(--color-text-muted);
            font-size: 18px;
        }

        .reviews-page-topbar {
            max-width: 1400px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .reviews-back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 14px 22px;
            border-radius: 999px;
            background: linear-gradient(135deg, #0d7377, #14a3a8);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 12px 28px rgba(13, 115, 119, 0.22);
        }

        .reviews-page-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .reviews-page-actions {
            max-width: 1400px;
            margin: 28px auto 0;
            display: flex;
            justify-content: center;
        }

        .reviews-page-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 28px;
            border-radius: 20px;
            background: var(--color-bg-secondary);
            color: var(--color-text-muted);
            box-shadow: var(--shadow-soft);
        }

        @media (max-width: 992px) {
            .reviews-page {
                padding: 120px 30px 70px;
            }

            .reviews-page-grid {
                grid-template-columns: 1fr;
            }

            .reviews-page-title {
                font-size: 42px;
            }
        }

        @media (max-width: 768px) {
            .reviews-page {
                padding: 110px 20px 60px;
            }

            .reviews-page-title {
                font-size: 34px;
            }

            .reviews-page-subtitle {
                font-size: 15px;
            }

            .reviews-back-btn,
            .reviews-more-btn {
                width: 100%;
            }

            .reviews-page-topbar {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="theme-toggle" id="themeToggle">
        <div class="theme-toggle-track">
            <div class="theme-toggle-thumb">
                <span class="theme-icon light">☀️</span>
                <span class="theme-icon dark">🌙</span>
            </div>
        </div>
    </div>

    <nav class="navbar scrolled" id="navbar">
        <a href="index.html" class="logo">
            <img src="images/logo.png" alt="ARCHISPACE">
            <div class="logo-text">
                <span class="logo-title">ARCHISPACE</span>
                <span class="logo-subtitle">Студия дизайна интерьера</span>
            </div>
        </a>

        <ul class="nav-links">
            <li><a href="index.html#about">О студии</a></li>
            <li><a href="index.html#services">Услуги</a></li>
            <li><a href="index.html#portfolio">Портфолио</a></li>
            <li><a href="index.html#process">Этапы</a></li>
            <li><a href="index.html#contact" class="nav-cta">Консультация</a></li>
        </ul>
    </nav>

    <main class="reviews-page">
        <div class="reviews-page-header">
            <h1 class="reviews-page-title">Все отзывы</h1>
            <p class="reviews-page-subtitle">Реальные впечатления клиентов о работе с ARCHISPACE</p>
        </div>

        <div class="reviews-page-topbar">
            <a href="index.html#reviews" class="reviews-back-btn">← Назад к сайту</a>
        </div>

        <div class="reviews-page-grid" id="allReviewsList">
            <div class="reviews-page-empty">Загрузка отзывов...</div>
        </div>

        <div class="reviews-page-actions">
            <button type="button" class="reviews-more-btn" id="loadAllReviewsBtn">
                Показать ещё
            </button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-app.js";
        import {
            getFirestore,
            collection,
            getDocs
        } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCV3JL-5Z9w1H3xS-tfkMGZArTthXP8CDo",
            authDomain: "archispace2024-16cff.firebaseapp.com",
            projectId: "archispace2024-16cff",
            storageBucket: "archispace2024-16cff.firebasestorage.app",
            messagingSenderId: "707638942739",
            appId: "1:707638942739:web:3d5ddeed92a29f3c5c73e6",
            measurementId: "G-1H1TFS07JS"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const db = getFirestore(firebaseApp);
        const reviewsCollection = collection(db, "reviews");

        const body = document.body;
        const themeToggle = document.getElementById("themeToggle");
        let currentTheme = localStorage.getItem("theme") || "light";

        function initTheme() {
            if (currentTheme === "dark") {
                body.setAttribute("data-theme", "dark");
                themeToggle?.classList.add("active");
            } else {
                body.removeAttribute("data-theme");
                themeToggle?.classList.remove("active");
            }
        }

        if (themeToggle) {
            themeToggle.addEventListener("click", () => {
                currentTheme = currentTheme === "light" ? "dark" : "light";
                localStorage.setItem("theme", currentTheme);
                initTheme();
            });
        }

        const allReviewsList = document.getElementById("allReviewsList");
        const loadAllReviewsBtn = document.getElementById("loadAllReviewsBtn");

        const PAGE_SIZE = 6;
        let currentPage = 1;
        let allReviewsCache = [];

        function getSavedLocalReviews() {
            try {
                return JSON.parse(localStorage.getItem("archispace_local_reviews")) || [];
            } catch {
                return [];
            }
        }

        function getReviewDate(review) {
            const raw = review.createdAt || review.createdat || null;
            if (!raw) return new Date(0);

            try {
                return raw.toDate ? raw.toDate() : new Date(raw);
            } catch {
                return new Date(0);
            }
        }

        function getStars(rating) {
            const safeRating = Math.max(1, Math.min(5, Number(rating) || 5));
            return "★".repeat(safeRating) + "☆".repeat(5 - safeRating);
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text ?? "";
            return div.innerHTML;
        }

        function formatReviewDate(value) {
            if (!value) return "Недавно";

            try {
                const date = value.toDate ? value.toDate() : new Date(value);
                return new Intl.DateTimeFormat("ru-RU", {
                    day: "2-digit",
                    month: "2-digit",
                    year: "numeric"
                }).format(date);
            } catch {
                return "Недавно";
            }
        }

        function mergeReviews(firebaseReviews, localReviews) {
            const merged = [...firebaseReviews];

            localReviews.forEach(localReview => {
                const exists = merged.some(item =>
                    item.name === localReview.name &&
                    (item.text || item.test || "") === (localReview.text || localReview.test || "") &&
                    Number(item.rating) === Number(localReview.rating)
                );

                if (!exists) {
                    merged.push(localReview);
                }
            });

            merged.sort((a, b) => getReviewDate(b) - getReviewDate(a));
            return merged;
        }

        function createReviewCard(review) {
            const reviewText = review.text || review.test || "Без текста";
            const reviewDate = review.createdAt || review.createdat;

            return `
                <div class="review-card">
                    <div class="review-head">
                        <div>
                            <h3 class="review-name">${escapeHtml(review.name || "Без имени")}</h3>
                            <span class="review-date">${escapeHtml(formatReviewDate(reviewDate))}</span>
                        </div>
                        <div class="review-rating">${getStars(review.rating)}</div>
                    </div>
                    <p class="review-text">${escapeHtml(reviewText)}</p>
                </div>
            `;
        }

        function renderAllReviews() {
            if (!allReviewsCache.length) {
                allReviewsList.innerHTML = `<div class="reviews-page-empty">Пока отзывов нет.</div>`;
                loadAllReviewsBtn.style.display = "none";
                return;
            }

            const visibleReviews = allReviewsCache.slice(0, currentPage * PAGE_SIZE);
            allReviewsList.innerHTML = visibleReviews.map(createReviewCard).join("");

            if (visibleReviews.length >= allReviewsCache.length) {
                loadAllReviewsBtn.style.display = "none";
            } else {
                loadAllReviewsBtn.style.display = "inline-flex";
            }
        }

        async function loadAllReviews() {
            try {
                const snapshot = await getDocs(reviewsCollection);

                const firebaseReviews = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));

                const localReviews = getSavedLocalReviews();

                allReviewsCache = mergeReviews(firebaseReviews, localReviews);
                renderAllReviews();
            } catch (error) {
                console.error("Ошибка загрузки отзывов:", error);

                const localReviews = getSavedLocalReviews();

                if (localReviews.length) {
                    allReviewsCache = mergeReviews([], localReviews);
                    renderAllReviews();
                    return;
                }

                allReviewsList.innerHTML = `<div class="reviews-page-empty">Не удалось загрузить отзывы.</div>`;
                loadAllReviewsBtn.style.display = "none";
            }
        }

        if (loadAllReviewsBtn) {
            loadAllReviewsBtn.addEventListener("click", () => {
                currentPage += 1;
                renderAllReviews();
            });
        }

        document.addEventListener("DOMContentLoaded", async () => {
            initTheme();
            await loadAllReviews();
        });
    </script>
</body>
</html>
